name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Bump version and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get current version
        id: current
        run: |
          version=$(jq -r .version custom_components/roommate/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        run: |
          jq --arg v "${{ steps.next.outputs.version }}" '.version = $v' \
            custom_components/roommate/manifest.json > tmp.json
          mv tmp.json custom_components/roommate/manifest.json

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/roommate/manifest.json
          git commit -m "Release v${{ steps.next.outputs.version }}"
          git tag "v${{ steps.next.outputs.version }}"
          git push
          git push --tags

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.next.outputs.version }}
          generate_release_notes: true
